name: Testes Automatizados

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1'

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    name: Executar testes e gerar relatório

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Executar testes
        run: npm test -- --coverage

      - name: Gerar relatório de cobertura
        if: always()
        run: |
          if [ -d coverage ]; then
            echo "## 📊 Relatório de Testes" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Testes executados com sucesso!" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload de artefatos de teste
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            junit.xml
          retention-days: 30

      - name: Comentar resultado no PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const testPassed = ${{ job.status == 'success' }};
            const status = testPassed ? '✅ PASSOU' : '❌ FALHOU';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Testes Automatizados\n\n${status}\n\nOs testes foram executados automaticamente via GitHub Actions.`
            });

      - name: Falhar se testes falharem
        if: failure()
        run: |
          echo "❌ Testes falharam! Verifique os logs acima."
          exit 1
