<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8a5c;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#d46848;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#grad)"/>
  <!-- Cafeteira body -->
  <rect x="100" y="80" width="100" height="130" rx="8" fill="#ff8a5c" opacity="0.8" stroke="#d46848" stroke-width="2"/>
  <!-- Water tank -->
  <ellipse cx="150" cy="95" rx="30" ry="20" fill="#ffe6d4" opacity="0.8"/>
  <!-- Outlet -->
  <rect x="140" y="145" width="20" height="30" rx="2" fill="#8b4513" opacity="0.9"/>
  <!-- Cup slot indicator -->
  <line x1="100" y1="175" x2="200" y2="175" stroke="#d46848" stroke-width="2" opacity="0.5"/>
</svg>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ff8a5c" />
      <stop offset="100%" stop-color="#3c1711" />
    </linearGradient>
    <radialGradient id="shine" cx="65%" cy="20%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.75)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </radialGradient>
  </defs>
  <rect width="1200" height="900" rx="48" fill="url(#bg)" />
  <rect x="70" y="70" width="1060" height="760" rx="40" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)" />
  <circle cx="900" cy="180" r="180" fill="#f4c95d" opacity="0.18" />
  <circle cx="300" cy="720" r="210" fill="#ffffff" opacity="0.08" />
  <rect x="170" y="180" width="860" height="340" rx="36" fill="rgba(10,10,18,0.18)" />
  <rect x="230" y="240" width="740" height="220" rx="28" fill="rgba(255,255,255,0.09)" stroke="rgba(255,255,255,0.14)" />
  <text x="170" y="610" fill="#ffffff" font-size="72" font-family="Inter, Arial, sans-serif" font-weight="800">Cafeteira Nespresso Essenza Mini</text>
  <text x="170" y="680" fill="#f7f2ff" font-size="34" font-family="Inter, Arial, sans-serif">Compacta, elegante e pronta para cafés rápidos com cápsulas originais.</text>
  <text x="170" y="742" fill="#ffffff" font-size="52" font-family="Inter, Arial, sans-serif" font-weight="700">R$ 359,00</text>
  <text x="170" y="794" fill="#f7f2ff" font-size="24" font-family="Inter, Arial, sans-serif">Usados de Qualidade • Estação Metrô São Judas</text>
