<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4dcfff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#2eb8d4;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#grad)"/>
  <!-- Monitor stand -->
  <rect x="60" y="200" width="180" height="60" rx="4" fill="#2eb8d4" opacity="0.8"/>
  <!-- Monitor body -->
  <rect x="40" y="50" width="220" height="160" rx="8" fill="#4dcfff" opacity="0.7" stroke="#2eb8d4" stroke-width="2"/>
  <!-- Screen -->
  <rect x="55" y="65" width="190" height="130" rx="4" fill="#1a2d4d" stroke="#4dcfff" stroke-width="1"/>
  <!-- Glow -->
  <circle cx="150" cy="140" r="50" fill="#4dcfff" opacity="0.2"/>
</svg>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#4dcfff" />
      <stop offset="100%" stop-color="#0d1a3a" />
    </linearGradient>
    <radialGradient id="shine" cx="65%" cy="20%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.75)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </radialGradient>
  </defs>
  <rect width="1200" height="900" rx="48" fill="url(#bg)" />
  <rect x="70" y="70" width="1060" height="760" rx="40" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)" />
  <circle cx="900" cy="180" r="180" fill="#8f5dff" opacity="0.18" />
  <circle cx="300" cy="720" r="210" fill="#ffffff" opacity="0.08" />
  <rect x="170" y="180" width="860" height="340" rx="36" fill="rgba(10,10,18,0.18)" />
  <rect x="230" y="240" width="740" height="220" rx="28" fill="rgba(255,255,255,0.09)" stroke="rgba(255,255,255,0.14)" />
  <text x="170" y="610" fill="#ffffff" font-size="72" font-family="Inter, Arial, sans-serif" font-weight="800">Monitor LG UltraWide 29”</text>
  <text x="170" y="680" fill="#f7f2ff" font-size="34" font-family="Inter, Arial, sans-serif">Tela IPS revisada com ótimo espaço para produtividade e entretenimento.</text>
  <text x="170" y="742" fill="#ffffff" font-size="52" font-family="Inter, Arial, sans-serif" font-weight="700">R$ 1.149,00</text>
